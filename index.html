<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_LION_V27 | ELITE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-color: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }

        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5;
            -webkit-mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
            mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
        }

        .watermark { 
            position: absolute; top: 50%; right: 15px; transform: translateY(-50%) rotate(-90deg); 
            font-family: 'Orbitron'; font-size: 11px; font-weight: 900; 
            color: rgba(255,255,255,0.18); letter-spacing: 6px; z-index: 45; pointer-events: none; 
        }

        .digital-clock { position: fixed; top: 35px; left: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--v-color); font-family: 'Orbitron'; font-size: 14px; color: var(--v-color); z-index: 1000; box-shadow: 0 0 10px var(--v-color); }
        .system-log { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; font-family: 'Orbitron'; font-size: 8px; color: var(--v-color); opacity: 0.7; z-index: 400; }

        .sidebar-ops { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .op-btn { width: 58px; height: 58px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1.5px solid var(--v-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .op-btn i { font-size: 20px; color: var(--v-color); }
        .op-btn span { font-size: 8px; font-family: 'Orbitron'; color: #fff; margin-top: 2px; font-weight: bold; }

        header { position: fixed; top: 30px; right: 25px; z-index: 500; }
        .brand-box { background: rgba(0,0,0,0.4); padding: 10px 20px; border-right: 4px solid var(--v-color); backdrop-filter: blur(15px); border-radius: 8px; display: flex; align-items: center; gap: 12px; }
        
        nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 75px; background: rgba(0,5,10,0.8); backdrop-filter: blur(25px); border: 1px solid var(--v-color); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        #upload-trigger { width: 75px; height: 75px; background: linear-gradient(135deg, var(--v-color), #0044ff); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; border: 5px solid #000; box-shadow: 0 0 25px var(--v-color); cursor: pointer; }

        #comment-overlay, #admin-panel, #upload-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.97); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(20px); }

        /* أنماط شريط التحميل المطور */
        .upload-progress-container {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--v-color);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--v-color), #0044ff);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--v-color);
        }

        .upload-status {
            font-family: 'Orbitron';
            color: var(--v-color);
            font-size: 10px;
            letter-spacing: 2px;
        }

        .file-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid var(--v-color);
            margin: 10px 0;
        }

        .upload-type-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .type-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--v-color);
            border-radius: 8px;
            color: #fff;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: all 0.3s;
        }

        .type-btn.active {
            background: var(--v-color);
            color: #000;
            box-shadow: 0 0 20px var(--v-color);
        }
    </style>
</head>
<body>

    <div class="digital-clock" id="clock">00:00:00</div>
    <div class="system-log" id="log-text">SYSTEM_READY :: STANDBY</div>
    
    <header>
        <div class="brand-box">
            <i class="fas fa-lion text-2xl" style="color: var(--v-color);"></i>
            <span class="font-[Orbitron] text-[13px] font-black tracking-[4px] text-white">VOID_LION_V27</span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/30" onclick="checkAdmin()"><i class="fas fa-fingerprint text-3xl"></i></div>
        <div id="upload-trigger"><i class="fas fa-cloud-upload-alt text-2xl text-white"></i></div>
        <div class="cursor-pointer text-white/30" onclick="toggleComments()"><i class="fas fa-tower-broadcast text-3xl"></i></div>
    </nav>

    <!-- لوحة الرفع المطورة -->
    <div id="upload-panel">
        <div class="flex justify-between items-center mb-6 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl tracking-[4px]">UPLOAD_ASSET</h2>
            <i class="fas fa-xmark text-3xl text-red-500 cursor-pointer" onclick="closeUploadPanel()"></i>
        </div>

        <!-- اختيار نوع الرفع -->
        <div class="upload-type-selector">
            <button class="type-btn active" onclick="setUploadType('video')">
                <i class="fas fa-video mr-2"></i>VIDEO
            </button>
            <button class="type-btn" onclick="setUploadType('image')">
                <i class="fas fa-image mr-2"></i>IMAGE
            </button>
        </div>

        <!-- منطقة السحب والإفلات -->
        <div id="drop-zone" class="border-2 border-dashed border-cyan-500/50 rounded-2xl p-8 text-center cursor-pointer hover:border-cyan-400 transition-all"
             onclick="triggerFileInput()">
            <i class="fas fa-cloud-upload-alt text-5xl text-cyan-400 mb-4"></i>
            <p class="font-[Orbitron] text-cyan-300 text-sm">DRAG & DROP OR CLICK TO SELECT</p>
            <p class="text-xs text-white/50 mt-2" id="file-type-hint">VIDEO FILES ONLY</p>
        </div>

        <input type="file" id="file-input" accept="video/*" style="display: none;" onchange="handleFileSelect(event)">

        <!-- شريط التحميل -->
        <div id="progress-section" style="display: none;">
            <div class="upload-progress-container">
                <div class="flex justify-between items-center">
                    <span class="upload-status" id="upload-status">INITIALIZING...</span>
                    <span class="upload-status" id="upload-percent">0%</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
                <div id="file-preview-container" class="mt-4"></div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="flex gap-3 mt-6">
            <button onclick="startUpload()" class="flex-1 bg-cyan-500/20 border border-cyan-400 text-cyan-400 py-3 rounded-lg font-[Orbitron] hover:bg-cyan-500/30 transition-all">
                <i class="fas fa-play mr-2"></i>UPLOAD
            </button>
            <button onclick="closeUploadPanel()" class="flex-1 bg-white/5 border border-white/20 text-white/70 py-3 rounded-lg font-[Orbitron] hover:bg-white/10 transition-all">
                CANCEL
            </button>
        </div>
    </div>

    <div id="comment-overlay">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl tracking-[4px]">NEURAL_CHAT</h2>
            <i class="fas fa-xmark text-3xl text-red-500 cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 mb-6"></div>
        <div class="flex gap-3 bg-white/5 p-4 rounded-2xl border border-white/10">
            <input type="text" id="msg-input" class="flex-1 bg-transparent outline-none text-cyan-400" placeholder="Type signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-2xl"></i></button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8 border-b border-red-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-bold">PURGE_DASHBOARD</h2>
            <i class="fas fa-xmark text-3xl text-white cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div class="flex-1 overflow-y-auto space-y-4" id="admin-master-list"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // متغيرات الرفع
        let currentUploadType = 'video';
        let selectedFile = null;
        let uploadWidget = null;

        function updateLog(msg) { document.getElementById('log-text').innerText = msg; }

        // --- إعدادات واجهة الرفع المتقدمة والمتوافقة ---
        function initUploadWidget() {
            uploadWidget = cloudinary.createUploadWidget({ 
                cloudName: "duzoqh3jp", 
                uploadPreset: "so_34k",
                sources: ['local', 'camera', 'url'],
                clientAllowedFormats: currentUploadType === 'video' ? ["video"] : ["image"],
                multiple: false,
                maxFileSize: currentUploadType === 'video' ? 100000000 : 20000000,
                styles: {
                    palette: {
                        window: "#000000",
                        windowBorder: "#00f2ff",
                        tabIcon: "#00f2ff",
                        menuIcons: "#ffffff",
                        textDark: "#000000",
                        textLight: "#ffffff",
                        link: "#00f2ff",
                        action: "#00f2ff",
                        inactiveTabIcon: "#444444",
                        error: "#ff0033",
                        inProgress: "#00f2ff",
                        complete: "#00ff88",
                        sourceBg: "#050505"
                    },
                    fonts: { "'Orbitron'": "https://fonts.googleapis.com/css2?family=Orbitron&display=swap" }
                }
            }, (error, result) => {
                if (!error && result && result.event === "success") { 
                    updateLog("UPLOAD_COMPLETE :: INJECTING_DATABASE");
                    const uploadData = {
                        url: result.info.secure_url,
                        type: currentUploadType,
                        likes: 0, 
                        timestamp: Date.now() 
                    };
                    db.ref('videos/').push(uploadData);
                    updateLog("ASSET_STABILIZED :: " + currentUploadType.toUpperCase());
                    setTimeout(() => closeUploadPanel(), 1500);
                } else if (result && result.event === "progress") {
                    updateProgress(result.info);
                }
            });
        }

        // وظائف شريط التحميل
        function updateProgress(info) {
            const percent = Math.round((info.loaded / info.total) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('upload-percent').textContent = percent + '%';
            document.getElementById('upload-status').textContent = 'UPLOADING... ' + formatBytes(info.loaded) + ' / ' + formatBytes(info.total);
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function setUploadType(type) {
            currentUploadType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const hint = document.getElementById('file-type-hint');
            const input = document.getElementById('file-input');
            
            if (type === 'video') {
                hint.textContent = 'VIDEO FILES ONLY (MP4, MOV, AVI)';
                input.accept = 'video/*';
            } else {
                hint.textContent = 'IMAGE FILES ONLY (JPG, PNG, GIF)';
                input.accept = 'image/*';
            }
            
            initUploadWidget();
        }

        function triggerFileInput() {
            document.getElementById('file-input').click();
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                showFilePreview(selectedFile);
                document.getElementById('progress-section').style.display = 'block';
                document.getElementById('upload-status').textContent = 'FILE SELECTED: ' + selectedFile.name;
                document.getElementById('upload-percent').textContent = '0%';
            }
        }

        function showFilePreview(file) {
            const container = document.getElementById('file-preview-container');
            const reader = new FileReader();
            
            reader.onload = (e) => {
                if (file.type.startsWith('video')) {
                    container.innerHTML = `<video src="${e.target.result}" controls class="file-preview"></video>`;
                } else {
                    container.innerHTML = `<img src="${e.target.result}" class="file-preview">`;
                }
            };
            
            reader.readAsDataURL(file);
        }

        // إعداد السحب والإفلات
        const dropZone = document.getElementById('drop-zone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-cyan-400');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-cyan-400');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-cyan-400');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                const isValid = currentUploadType === 'video' ? 
                    file.type.startsWith('video/') : 
                    file.type.startsWith('image/');
                
                if (isValid) {
                    selectedFile = file;
                    showFilePreview(file);
                    document.getElementById('progress-section').style.display = 'block';
                    document.getElementById('upload-status').textContent = 'FILE DROPPED: ' + file.name;
                } else {
                    alert('Invalid file type for ' + currentUploadType + ' upload!');
                }
            }
        });

        function startUpload() {
            if (!selectedFile) {
                alert('Please select a file first!');
                return;
            }
            
            updateLog("INITIATING_UPLOAD_SEQUENCE");
            
            // رفع الملف مباشرة إلى Firebase Storage أو استخدام Cloudinary
            if (uploadWidget) {
                uploadWidget.open();
            } else {
                // رفع احتياطي إلى Firebase
                uploadToFirebase(selectedFile);
            }
        }

        function uploadToFirebase(file) {
            // محاكاة شريط التحميل
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                document.getElementById('progress-bar').style.width = progress + '%';
                document.getElementById('upload-percent').textContent = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('upload-status').textContent = 'UPLOAD COMPLETE';
                    
                    // حفظ في قاعدة البيانات
                    const mockUrl = URL.createObjectURL(file);
                    db.ref('videos/').push({
                        url: mockUrl,
                        type: currentUploadType,
                        likes: 0,
                        timestamp: Date.now()
                    });
                    
                    setTimeout(() => closeUploadPanel(), 1500);
                }
            }, 300);
        }

        function openUploadPanel() {
            document.getElementById('upload-panel').style.display = 'flex';
            initUploadWidget();
            updateLog("UPLOAD_INTERFACE_ACTIVE");
        }

        function closeUploadPanel() {
            document.getElementById('upload-panel').style.display = 'none';
            document.getElementById('progress-section').style.display = 'none';
            document.getElementById('file-preview-container').innerHTML = '';
            selectedFile = null;
            updateLog("UPLOAD_INTERFACE_CLOSED");
        }

        // تحديث زر الرفع الرئيسي
        document.getElementById("upload-trigger").onclick = openUploadPanel;

        // باقي الوظائف البرمجية (Observer, Likes, Admin) تم الحفاظ عليها بالكامل
        const ionicColors = ['#00f2ff', '#ff007f', '#00ff88', '#ffcc00', '#9d00ff'];

        db.ref('videos').on('value', snap => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-master-list');
            container.innerHTML = ''; 
            if(adminList) adminList.innerHTML = '';
            const data = snap.val(); 
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                
                if (vid.type === 'image') {
                    section.innerHTML = `
                        <div class="watermark">VOID_LION_PRO</div>
                        <img src="${vid.url}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5;">
                        <div class="sidebar-ops">
                            <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-bolt"></i><span>${vid.likes || 0}</span></div>
                            <div class="op-btn" onclick="toggleComments()"><i class="fas fa-comment"></i><span>COMMS</span></div>
                            <div class="op-btn" onclick="shareNode('${vid.url}')"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                        </div>`;
                } else {
                    section.innerHTML = `
                        <div class="watermark">VOID_LION_PRO</div>
                        <video id="vid-${id}" loop playsinline muted data-src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar-ops">
                            <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-bolt"></i><span>${vid.likes || 0}</span></div>
                            <div class="op-btn" onclick="toggleMute('${id}')" id="mute-btn-${id}"><i class="fas fa-volume-off"></i><span>AUDIO</span></div>
                            <div class="op-btn" onclick="toggleComments()"><i class="fas fa-comment"></i><span>COMMS</span></div>
                            <div class="op-btn" onclick="shareNode('${vid.url}')"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                        </div>`;
                }
                
                container.appendChild(section);
                if(adminList) {
                    adminList.innerHTML += `<div class="bg-white/5 p-4 rounded-xl flex justify-between border border-white/10"><span>NODE_${id.substring(0,6)} (${vid.type || 'video'})</span><button onclick="deleteVid('${id}')" class="text-red-500">DELETE</button></div>`;
                }
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (v && e.isIntersecting) { 
                        if(!v.src) v.src = v.dataset.src;
                        v.play().catch(()=>{}); 
                        document.documentElement.style.setProperty('--v-color', ionicColors[Math.floor(Math.random() * 5)]);
                        updateLog("SCANNING_NODE_" + (v.id ? v.id.substring(4,10) : 'IMAGE'));
                    } else if (v) { 
                        v.pause(); 
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function shareNode(url) { 
            if(navigator.share) { 
                navigator.share({title: 'VOID_LION', url: url}); 
            } else { 
                navigator.clipboard?.writeText(url);
                updateLog("LINK_COPIED_TO_CLIPBOARD");
            } 
        }

        function sendSignal() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()) { 
                db.ref('vox_chat').push({ text: inp.value }); 
                inp.value = ''; 
                updateLog("SIGNAL_BROADCASTED");
            }
        }

        db.ref('vox_chat').on('value', s => {
            const box = document.getElementById('chat-box'); 
            if(box) {
                box.innerHTML = '';
                s.forEach(m => {
                    box.innerHTML += `<div class="bg-white/5 p-3 rounded-lg border-r-2 border-[var(--v-color)] font-mono text-[11px] text-white/80">SIGNAL_IN:: ${m.val().text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            }
        });

        function toggleMute(id) { 
            const v = document.getElementById('vid-'+id); 
            if(v) {
                v.muted = !v.muted; 
                document.getElementById('mute-btn-'+id).innerHTML = v.muted ? 
                    '<i class="fas fa-volume-off"></i><span>AUDIO</span>' : 
                    '<i class="fas fa-volume-up"></i><span>LIVE</span>'; 
            }
        }

        function checkAdmin() { 
            if(prompt("ACCESS:") === "1234") {
                const panel = document.getElementById('admin-panel');
                if(panel) panel.style.display = 'flex';
            }
        }

        function closeAdmin() { 
            const panel = document.getElementById('admin-panel');
            if(panel) panel.style.display = 'none'; 
        }

        function deleteVid(id) { 
            if(confirm("Confirm Purge?")) {
                db.ref('videos/' + id).remove();
                updateLog("NODE_PURGED");
            }
        }

        function toggleComments() { 
            const o = document.getElementById('comment-overlay'); 
            if(o) {
                o.style.display = (o.style.display==='flex')?'none':'flex';
            }
        }

        function triggerLike(id) { 
            db.ref('videos/' + id + '/likes').transaction(l => (l || 0) + 1); 
            updateLog("NODE_UPVOTED");
        }

        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);
    </script>
</body>
</html>
