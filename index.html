<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_LION_V27 | ELITE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-color: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }

        video, .media-content { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5;
            -webkit-mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
            mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
        }

        .watermark { 
            position: absolute; top: 50%; right: 15px; transform: translateY(-50%) rotate(-90deg); 
            font-family: 'Orbitron'; font-size: 11px; font-weight: 900; 
            color: rgba(255,255,255,0.18); letter-spacing: 6px; z-index: 45; pointer-events: none; 
        }

        .digital-clock { position: fixed; top: 35px; left: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--v-color); font-family: 'Orbitron'; font-size: 14px; color: var(--v-color); z-index: 1000; box-shadow: 0 0 10px var(--v-color); }
        .system-log { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; font-family: 'Orbitron'; font-size: 8px; color: var(--v-color); opacity: 0.7; z-index: 400; }

        .sidebar-ops { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .op-btn { width: 58px; height: 58px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1.5px solid var(--v-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .op-btn i { font-size: 20px; color: var(--v-color); }
        .op-btn span { font-size: 8px; font-family: 'Orbitron'; color: #fff; margin-top: 2px; font-weight: bold; }

        header { position: fixed; top: 30px; right: 25px; z-index: 500; }
        .brand-box { background: rgba(0,0,0,0.4); padding: 10px 20px; border-right: 4px solid var(--v-color); backdrop-filter: blur(15px); border-radius: 8px; display: flex; align-items: center; gap: 12px; }
        
        nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 75px; background: rgba(0,5,10,0.8); backdrop-filter: blur(25px); border: 1px solid var(--v-color); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        #upload-trigger { width: 75px; height: 75px; background: linear-gradient(135deg, var(--v-color), #0044ff); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; border: 5px solid #000; box-shadow: 0 0 25px var(--v-color); cursor: pointer; }

        #comment-overlay, #admin-panel, #upload-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.97); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(20px); overflow-y: auto; }

        /* أنماط واجهة الرفع المخصصة */
        .upload-area {
            border: 2px dashed var(--v-color);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 242, 255, 0.02);
            margin: 20px 0;
        }

        .upload-area:hover {
            background: rgba(0, 242, 255, 0.05);
            border-color: #fff;
        }

        .progress-container {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--v-color);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--v-color), #0044ff);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 15px var(--v-color);
        }

        .preview-media {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            border: 2px solid var(--v-color);
            margin: 15px auto;
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--v-color), #0044ff);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s;
        }

        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upload-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--v-color);
        }
    </style>
</head>
<body>

    <div class="digital-clock" id="clock">00:00:00</div>
    <div class="system-log" id="log-text">SYSTEM_READY :: STANDBY</div>
    
    <header>
        <div class="brand-box">
            <i class="fas fa-lion text-2xl" style="color: var(--v-color);"></i>
            <span class="font-[Orbitron] text-[13px] font-black tracking-[4px] text-white">VOID_LION_V27</span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/30" onclick="checkAdmin()"><i class="fas fa-fingerprint text-3xl"></i></div>
        <div id="upload-trigger"><i class="fas fa-cloud-upload-alt text-2xl text-white"></i></div>
        <div class="cursor-pointer text-white/30" onclick="toggleComments()"><i class="fas fa-tower-broadcast text-3xl"></i></div>
    </nav>

    <!-- لوحة الرفع المطورة - نسخة نظيفة -->
    <div id="upload-panel">
        <div class="flex justify-between items-center mb-6 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl">
                <i class="fas fa-upload mr-2"></i>UPLOAD CENTER
            </h2>
            <i class="fas fa-times-circle text-3xl text-red-500 cursor-pointer" onclick="closeUploadPanel()"></i>
        </div>

        <!-- اختيار النوع -->
        <div class="flex gap-4 mb-6">
            <button class="flex-1 py-3 rounded-lg font-[Orbitron] bg-cyan-500/20 border border-cyan-400 text-cyan-400" 
                    id="videoTypeBtn" onclick="setUploadType('video')">
                <i class="fas fa-video mr-2"></i>VIDEO
            </button>
            <button class="flex-1 py-3 rounded-lg font-[Orbitron] bg-white/5 border border-white/20 text-white/70" 
                    id="imageTypeBtn" onclick="setUploadType('image')">
                <i class="fas fa-image mr-2"></i>IMAGE
            </button>
        </div>

        <!-- منطقة الرفع -->
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt text-6xl text-cyan-400 mb-4"></i>
            <p class="font-[Orbitron] text-lg text-cyan-300 mb-2">SELECT FILE</p>
            <p class="text-sm text-white/50" id="fileTypeHint">Click or drop video file here</p>
        </div>

        <input type="file" id="fileInput" accept="video/*" style="display: none;">

        <!-- شريط التقدم -->
        <div id="progressSection" style="display: none;">
            <div class="progress-container">
                <div class="flex justify-between mb-2">
                    <span class="font-[Orbitron] text-cyan-400 text-sm" id="uploadStatus">
                        <i class="fas fa-clock mr-2"></i>READY
                    </span>
                    <span class="font-[Orbitron] text-cyan-400 text-sm" id="uploadPercent">0%</span>
                </div>
                
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div class="text-center">
                        <p class="text-xs text-white/50">FILE SIZE</p>
                        <p class="font-[Orbitron] text-cyan-400" id="fileSize">0 MB</p>
                    </div>
                    <div class="text-center">
                        <p class="text-xs text-white/50">UPLOADED</p>
                        <p class="font-[Orbitron] text-cyan-400" id="uploadedSize">0 MB</p>
                    </div>
                </div>

                <div id="previewContainer" class="text-center mt-4"></div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <button class="upload-btn mt-6" id="uploadBtn" onclick="startUpload()" disabled>
            <i class="fas fa-play mr-2"></i>START UPLOAD
        </button>
        
        <button class="w-full py-3 rounded-lg font-[Orbitron] bg-white/5 border border-white/20 text-white/70 mt-3" 
                onclick="closeUploadPanel()">
            <i class="fas fa-times mr-2"></i>CANCEL
        </button>
    </div>

    <div id="comment-overlay">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl tracking-[4px]">NEURAL_CHAT</h2>
            <i class="fas fa-times-circle text-3xl text-red-500 cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 mb-6"></div>
        <div class="flex gap-3 bg-white/5 p-4 rounded-2xl border border-white/10">
            <input type="text" id="msg-input" class="flex-1 bg-transparent outline-none text-cyan-400" placeholder="Type signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-2xl"></i></button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8 border-b border-red-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-bold">PURGE_DASHBOARD</h2>
            <i class="fas fa-times-circle text-3xl text-white cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div class="flex-1 overflow-y-auto space-y-4" id="admin-master-list"></div>
    </div>

    <script>
        // تكوين Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBqN0N0qC0qC0qC0qC0qC0qC0qC0qC0qC0",
            authDomain: "vexe-f6558.firebaseapp.com",
            databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com",
            projectId: "vexe-f6558",
            storageBucket: "vexe-f6558.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:1234567890123456789012"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // متغيرات عامة
        let currentType = 'video';
        let selectedFile = null;

        function updateLog(msg) {
            document.getElementById('log-text').innerText = msg;
        }

        // تغيير نوع الرفع
        function setUploadType(type) {
            currentType = type;
            
            // تحديث الأزرار
            document.getElementById('videoTypeBtn').className = 
                type === 'video' ? 'flex-1 py-3 rounded-lg font-[Orbitron] bg-cyan-500/20 border border-cyan-400 text-cyan-400' :
                'flex-1 py-3 rounded-lg font-[Orbitron] bg-white/5 border border-white/20 text-white/70';
            
            document.getElementById('imageTypeBtn').className = 
                type === 'image' ? 'flex-1 py-3 rounded-lg font-[Orbitron] bg-cyan-500/20 border border-cyan-400 text-cyan-400' :
                'flex-1 py-3 rounded-lg font-[Orbitron] bg-white/5 border border-white/20 text-white/70';
            
            // تحديث نوع الملفات المقبولة
            const input = document.getElementById('fileInput');
            const hint = document.getElementById('fileTypeHint');
            
            if (type === 'video') {
                input.accept = 'video/*';
                hint.textContent = 'Click or drop video file here (MP4, MOV, AVI)';
            } else {
                input.accept = 'image/*';
                hint.textContent = 'Click or drop image file here (JPG, PNG, GIF)';
            }
            
            updateLog(`UPLOAD_MODE :: ${type.toUpperCase()}`);
        }

        // معالجة اختيار الملف
        document.getElementById('fileInput').addEventListener('change', function(e) {
            handleFile(e.target.files[0]);
        });

        // السحب والإفلات
        const uploadArea = document.querySelector('.upload-area');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#fff';
            uploadArea.style.background = 'rgba(0, 242, 255, 0.1)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = 'var(--v-color)';
            uploadArea.style.background = 'rgba(0, 242, 255, 0.02)';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--v-color)';
            uploadArea.style.background = 'rgba(0, 242, 255, 0.02)';
            
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            if (!file) return;
            
            // التحقق من النوع
            const isValid = currentType === 'video' ? 
                file.type.startsWith('video/') : 
                file.type.startsWith('image/');
            
            if (!isValid) {
                alert(`Please select a valid ${currentType} file!`);
                return;
            }
            
            selectedFile = file;
            
            // عرض المعلومات
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('fileSize').textContent = formatBytes(file.size);
            document.getElementById('uploadedSize').textContent = '0 Bytes';
            document.getElementById('uploadStatus').innerHTML = '<i class="fas fa-check mr-2"></i>FILE READY';
            document.getElementById('uploadPercent').textContent = '0%';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('uploadBtn').disabled = false;
            
            // معاينة الملف
            showPreview(file);
            
            updateLog(`FILE_SELECTED :: ${file.name}`);
        }

        function showPreview(file) {
            const container = document.getElementById('previewContainer');
            const reader = new FileReader();
            
            reader.onload = (e) => {
                if (file.type.startsWith('video')) {
                    container.innerHTML = `
                        <video src="${e.target.result}" controls class="preview-media"></video>
                        <p class="text-xs text-cyan-400 mt-2 font-mono">${file.name}</p>
                    `;
                } else {
                    container.innerHTML = `
                        <img src="${e.target.result}" class="preview-media">
                        <p class="text-xs text-cyan-400 mt-2 font-mono">${file.name}</p>
                    `;
                }
            };
            
            reader.readAsDataURL(file);
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // بدء الرفع
        function startUpload() {
            if (!selectedFile) return;
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>UPLOADING...';
            
            updateLog(`UPLOAD_STARTED :: ${selectedFile.name}`);
            
            // رفع إلى Firebase Storage
            const storageRef = storage.ref();
            const timestamp = Date.now();
            const fileName = `${currentType}_${timestamp}_${selectedFile.name}`;
            const fileRef = storageRef.child(`uploads/${fileName}`);
            
            const uploadTask = fileRef.put(selectedFile);
            
            uploadTask.on('state_changed',
                (snapshot) => {
                    // تحديث شريط التقدم
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    const percent = Math.round(progress);
                    
                    document.getElementById('progressBar').style.width = percent + '%';
                    document.getElementById('uploadPercent').textContent = percent + '%';
                    document.getElementById('uploadedSize').textContent = formatBytes(snapshot.bytesTransferred);
                    document.getElementById('uploadStatus').innerHTML = '<i class="fas fa-upload mr-2"></i>UPLOADING';
                    
                },
                (error) => {
                    // خطأ في الرفع
                    updateLog(`UPLOAD_ERROR :: ${error.message}`);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play mr-2"></i>RETRY UPLOAD';
                    document.getElementById('uploadStatus').innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i>UPLOAD FAILED';
                },
                async () => {
                    // اكتمل الرفع
                    const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                    
                    document.getElementById('uploadStatus').innerHTML = '<i class="fas fa-check-circle mr-2"></i>UPLOAD COMPLETE';
                    
                    // حفظ في Realtime Database
                    const uploadData = {
                        url: downloadURL,
                        type: currentType,
                        likes: 0,
                        timestamp: timestamp,
                        filename: selectedFile.name,
                        size: selectedFile.size
                    };
                    
                    await db.ref('videos/').push(uploadData);
                    
                    updateLog(`UPLOAD_SUCCESS :: ${currentType.toUpperCase()}`);
                    
                    setTimeout(() => {
                        closeUploadPanel();
                        resetUploadForm();
                    }, 2000);
                }
            );
        }

        function resetUploadForm() {
            selectedFile = null;
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('previewContainer').innerHTML = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('uploadBtn').innerHTML = '<i class="fas fa-play mr-2"></i>START UPLOAD';
        }

        function openUploadPanel() {
            document.getElementById('upload-panel').style.display = 'flex';
            resetUploadForm();
            updateLog("UPLOAD_INTERFACE_ACTIVE");
        }

        function closeUploadPanel() {
            document.getElementById('upload-panel').style.display = 'none';
            updateLog("UPLOAD_INTERFACE_CLOSED");
        }

        function toggleComments() {
            const overlay = document.getElementById('comment-overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        function checkAdmin() {
            if(prompt("ACCESS CODE:") === "1234") {
                document.getElementById('admin-panel').style.display = 'flex';
                updateLog("ADMIN_ACCESS_GRANTED");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        // باقي الوظائف كما هي
        const ionicColors = ['#00f2ff', '#ff007f', '#00ff88', '#ffcc00', '#9d00ff'];

        db.ref('videos').on('value', snap => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-master-list');
            container.innerHTML = ''; 
            if(adminList) adminList.innerHTML = '';
            
            const data = snap.val(); 
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                
                if (vid.type === 'image') {
                    section.innerHTML = `
                        <div class="watermark">VOID_LION_PRO</div>
                        <img src="${vid.url}" class="media-content">
                        <div class="sidebar-ops">
                            <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-bolt"></i><span>${vid.likes || 0}</span></div>
                            <div class="op-btn" onclick="toggleComments()"><i class="fas fa-comment"></i><span>COMMS</span></div>
                            <div class="op-btn" onclick="shareNode('${vid.url}')"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                        </div>`;
                } else {
                    section.innerHTML = `
                        <div class="watermark">VOID_LION_PRO</div>
                        <video id="vid-${id}" loop playsinline muted data-src="${vid.url}" class="media-content" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar-ops">
                            <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-bolt"></i><span>${vid.likes || 0}</span></div>
                            <div class="op-btn" onclick="toggleMute('${id}')" id="mute-btn-${id}"><i class="fas fa-volume-off"></i><span>AUDIO</span></div>
                            <div class="op-btn" onclick="toggleComments()"><i class="fas fa-comment"></i><span>COMMS</span></div>
                            <div class="op-btn" onclick="shareNode('${vid.url}')"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                        </div>`;
                }
                
                container.appendChild(section);
                if(adminList) {
                    adminList.innerHTML += `<div class="bg-white/5 p-4 rounded-xl flex justify-between border border-white/10"><span>NODE_${id.substring(0,6)} (${vid.type || 'video'})</span><button onclick="deleteVid('${id}')" class="text-red-500">DELETE</button></div>`;
                }
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (v && e.isIntersecting) { 
                        if(!v.src) v.src = v.dataset.src;
                        v.play().catch(()=>{}); 
                        document.documentElement.style.setProperty('--v-color', ionicColors[Math.floor(Math.random() * 5)]);
                        updateLog("SCANNING_NODE_" + (v.id ? v.id.substring(4,10) : 'IMAGE'));
                    } else if (v) { 
                        v.pause(); 
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function shareNode(url) { 
            if(navigator.share) { 
                navigator.share({title: 'VOID_LION', url: url}); 
            } else { 
                navigator.clipboard?.writeText(url);
                updateLog("LINK_COPIED");
            } 
        }

        function sendSignal() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()) { 
                db.ref('vox_chat').push({ text: inp.value }); 
                inp.value = ''; 
                updateLog("SIGNAL_BROADCASTED");
            }
        }

        db.ref('vox_chat').on('value', s => {
            const box = document.getElementById('chat-box'); 
            box.innerHTML = '';
            s.forEach(m => {
                box.innerHTML += `<div class="bg-white/5 p-3 rounded-lg border-r-2 border-[var(--v-color)] font-mono text-[11px] text-white/80">SIGNAL_IN:: ${m.val().text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        function toggleMute(id) { 
            const v = document.getElementById('vid-'+id); 
            v.muted = !v.muted; 
            document.getElementById('mute-btn-'+id).innerHTML = v.muted ? 
                '<i class="fas fa-volume-off"></i><span>AUDIO</span>' : 
                '<i class="fas fa-volume-up"></i><span>LIVE</span>'; 
        }

        function deleteVid(id) { 
            if(confirm("Confirm Purge?")) db.ref('videos/' + id).remove(); 
        }

        function triggerLike(id) { 
            db.ref('videos/' + id + '/likes').transaction(l => (l || 0) + 1); 
            updateLog("NODE_UPVOTED");
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        document.getElementById("upload-trigger").onclick = openUploadPanel;
    </script>
</body>
</html>
