<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_LION_V27 | ELITE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-color: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }

        video, .media-content { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5;
            -webkit-mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
            mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
        }

        .watermark { 
            position: absolute; top: 50%; right: 15px; transform: translateY(-50%) rotate(-90deg); 
            font-family: 'Orbitron'; font-size: 11px; font-weight: 900; 
            color: rgba(255,255,255,0.18); letter-spacing: 6px; z-index: 45; pointer-events: none; 
        }

        .digital-clock { position: fixed; top: 35px; left: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--v-color); font-family: 'Orbitron'; font-size: 14px; color: var(--v-color); z-index: 1000; box-shadow: 0 0 10px var(--v-color); }
        .system-log { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; font-family: 'Orbitron'; font-size: 8px; color: var(--v-color); opacity: 0.7; z-index: 400; }

        .sidebar-ops { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .op-btn { width: 58px; height: 58px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1.5px solid var(--v-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .op-btn i { font-size: 20px; color: var(--v-color); }
        .op-btn span { font-size: 8px; font-family: 'Orbitron'; color: #fff; margin-top: 2px; font-weight: bold; }
        .op-btn:hover { background: rgba(0, 242, 255, 0.2); transform: scale(1.1); }

        header { position: fixed; top: 30px; right: 25px; z-index: 500; }
        .brand-box { background: rgba(0,0,0,0.4); padding: 10px 20px; border-right: 4px solid var(--v-color); backdrop-filter: blur(15px); border-radius: 8px; display: flex; align-items: center; gap: 12px; }
        
        nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 75px; background: rgba(0,5,10,0.8); backdrop-filter: blur(25px); border: 1px solid var(--v-color); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        #upload-trigger { width: 75px; height: 75px; background: linear-gradient(135deg, var(--v-color), #0044ff); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; border: 5px solid #000; box-shadow: 0 0 25px var(--v-color); cursor: pointer; transition: all 0.3s; }
        #upload-trigger:hover { transform: scale(1.1); box-shadow: 0 0 35px var(--v-color); }

        #comment-overlay, #admin-panel, #upload-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.97); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(20px); overflow-y: auto; }

        /* أنماط شريط التحميل */
        .upload-progress-container {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--v-color);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--v-color), #0044ff);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--v-color);
            position: relative;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .upload-status {
            font-family: 'Orbitron';
            color: var(--v-color);
            font-size: 11px;
            letter-spacing: 2px;
        }

        .file-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--v-color);
            margin: 15px 0;
            object-fit: contain;
        }

        .upload-type-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .type-btn {
            flex: 1;
            padding: 15px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .type-btn.active {
            background: var(--v-color);
            color: #000;
            box-shadow: 0 0 25px var(--v-color);
            border-color: var(--v-color);
        }

        .type-btn:hover:not(.active) {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--v-color);
        }

        #drop-zone {
            border: 2px dashed rgba(0, 242, 255, 0.3);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 242, 255, 0.02);
        }

        #drop-zone:hover {
            border-color: var(--v-color);
            background: rgba(0, 242, 255, 0.05);
        }

        #drop-zone.dragover {
            border-color: var(--v-color);
            background: rgba(0, 242, 255, 0.1);
            transform: scale(1.02);
        }

        .upload-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .stat-box {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            font-family: 'Orbitron';
        }

        .stat-value {
            font-size: 14px;
            color: var(--v-color);
            font-family: 'Orbitron';
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="digital-clock" id="clock">00:00:00</div>
    <div class="system-log" id="log-text">SYSTEM_READY :: STANDBY</div>
    
    <header>
        <div class="brand-box">
            <i class="fas fa-lion text-2xl" style="color: var(--v-color);"></i>
            <span class="font-[Orbitron] text-[13px] font-black tracking-[4px] text-white">VOID_LION_V27</span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/30 hover:text-white/60 transition-colors" onclick="checkAdmin()">
            <i class="fas fa-fingerprint text-3xl"></i>
        </div>
        <div id="upload-trigger">
            <i class="fas fa-cloud-upload-alt text-2xl text-white"></i>
        </div>
        <div class="cursor-pointer text-white/30 hover:text-white/60 transition-colors" onclick="toggleComments()">
            <i class="fas fa-tower-broadcast text-3xl"></i>
        </div>
    </nav>

    <!-- لوحة الرفع المطورة -->
    <div id="upload-panel">
        <div class="flex justify-between items-center mb-6 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl tracking-[4px]">
                <i class="fas fa-upload mr-2"></i>UPLOAD_ASSET
            </h2>
            <i class="fas fa-times-circle text-3xl text-red-500 cursor-pointer hover:text-red-400 transition-colors" onclick="closeUploadPanel()"></i>
        </div>

        <!-- اختيار نوع الرفع -->
        <div class="upload-type-selector">
            <button class="type-btn active" onclick="setUploadType('video')">
                <i class="fas fa-video mr-2"></i>VIDEO
            </button>
            <button class="type-btn" onclick="setUploadType('image')">
                <i class="fas fa-image mr-2"></i>IMAGE
            </button>
        </div>

        <!-- منطقة السحب والإفلات -->
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-cloud-upload-alt text-5xl text-cyan-400 mb-4"></i>
            <p class="font-[Orbitron] text-cyan-300 text-sm mb-2">DRAG & DROP OR CLICK TO SELECT</p>
            <p class="text-xs text-white/50" id="file-type-hint">VIDEO FILES ONLY (MP4, MOV, AVI)</p>
        </div>

        <input type="file" id="file-input" accept="video/*" style="display: none;">

        <!-- شريط التحميل -->
        <div id="progress-section" style="display: none;">
            <div class="upload-progress-container">
                <div class="flex justify-between items-center mb-2">
                    <span class="upload-status" id="upload-status">
                        <i class="fas fa-spinner fa-spin mr-2"></i>INITIALIZING...
                    </span>
                    <span class="upload-status" id="upload-percent">0%</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
                
                <!-- إحصائيات التحميل -->
                <div class="upload-stats">
                    <div class="stat-box">
                        <div class="stat-label">FILE SIZE</div>
                        <div class="stat-value" id="file-size">0 MB</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">UPLOADED</div>
                        <div class="stat-value" id="uploaded-size">0 MB</div>
                    </div>
                </div>
                
                <div id="file-preview-container" class="text-center"></div>
                
                <div class="text-center mt-3">
                    <span class="text-xs text-white/40 font-[Orbitron]" id="time-remaining">--</span>
                </div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="flex gap-3 mt-6">
            <button onclick="startUpload()" id="upload-btn" class="flex-1 bg-cyan-500/20 border border-cyan-400 text-cyan-400 py-4 rounded-lg font-[Orbitron] hover:bg-cyan-500/30 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-play mr-2"></i>START UPLOAD
            </button>
            <button onclick="closeUploadPanel()" class="flex-1 bg-white/5 border border-white/20 text-white/70 py-4 rounded-lg font-[Orbitron] hover:bg-white/10 transition-all">
                <i class="fas fa-times mr-2"></i>CANCEL
            </button>
        </div>
    </div>

    <div id="comment-overlay">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl tracking-[4px]">
                <i class="fas fa-satellite-dish mr-2"></i>NEURAL_CHAT
            </h2>
            <i class="fas fa-times-circle text-3xl text-red-500 cursor-pointer hover:text-red-400" onclick="toggleComments()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 mb-6"></div>
        <div class="flex gap-3 bg-white/5 p-4 rounded-2xl border border-white/10">
            <input type="text" id="msg-input" class="flex-1 bg-transparent outline-none text-cyan-400" placeholder="Type signal...">
            <button onclick="sendSignal()" class="text-cyan-400 hover:text-cyan-300">
                <i class="fas fa-paper-plane text-2xl"></i>
            </button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8 border-b border-red-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-bold">
                <i class="fas fa-skull mr-2"></i>PURGE_DASHBOARD
            </h2>
            <i class="fas fa-times-circle text-3xl text-white cursor-pointer hover:text-red-400" onclick="closeAdmin()"></i>
        </div>
        <div class="flex-1 overflow-y-auto space-y-4" id="admin-master-list"></div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // متغيرات عامة
        let currentUploadType = 'video';
        let selectedFile = null;
        let cloudinaryWidget = null;
        let uploadStartTime = null;

        function updateLog(msg) { 
            const logElement = document.getElementById('log-text');
            if(logElement) logElement.innerText = msg; 
        }

        // تهيئة Cloudinary Widget
        function initCloudinaryWidget() {
            cloudinaryWidget = cloudinary.createUploadWidget({ 
                cloudName: "duzoqh3jp", 
                uploadPreset: "so_34k",
                sources: ['local', 'camera', 'url'],
                clientAllowedFormats: currentUploadType === 'video' ? ["video", "mp4", "mov", "avi"] : ["image", "jpg", "jpeg", "png", "gif"],
                maxFileSize: currentUploadType === 'video' ? 100000000 : 20000000,
                multiple: false,
                showAdvancedOptions: false,
                cropping: false,
                styles: {
                    palette: {
                        window: "#000000",
                        windowBorder: "#00f2ff",
                        tabIcon: "#00f2ff",
                        menuIcons: "#ffffff",
                        textDark: "#000000",
                        textLight: "#ffffff",
                        link: "#00f2ff",
                        action: "#00f2ff",
                        inactiveTabIcon: "#444444",
                        error: "#ff0033",
                        inProgress: "#00f2ff",
                        complete: "#00ff88",
                        sourceBg: "#050505"
                    }
                }
            }, (error, result) => {
                if (error) {
                    updateLog("UPLOAD_ERROR :: " + error);
                    document.getElementById('upload-status').innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i>UPLOAD FAILED';
                    return;
                }
                
                if (result && result.event === "success") { 
                    updateLog("UPLOAD_COMPLETE :: SAVING TO DATABASE");
                    document.getElementById('upload-status').innerHTML = '<i class="fas fa-check-circle mr-2"></i>UPLOAD COMPLETE';
                    
                    // حفظ في قاعدة البيانات
                    const uploadData = {
                        url: result.info.secure_url,
                        type: currentUploadType,
                        likes: 0, 
                        timestamp: Date.now(),
                        size: result.info.bytes,
                        format: result.info.format
                    };
                    
                    db.ref('videos/').push(uploadData)
                        .then(() => {
                            updateLog("ASSET_STABILIZED :: " + currentUploadType.toUpperCase());
                            setTimeout(() => {
                                closeUploadPanel();
                                resetUploadInterface();
                            }, 2000);
                        })
                        .catch(err => {
                            updateLog("DATABASE_ERROR :: " + err);
                        });
                        
                } else if (result && result.event === "progress") {
                    updateProgressBar(result.info);
                } else if (result && result.event === "queued") {
                    updateLog("UPLOAD_QUEUED :: " + result.info.files[0].name);
                    document.getElementById('upload-status').innerHTML = '<i class="fas fa-hourglass-half mr-2"></i>QUEUED';
                }
            });
        }

        // تحديث شريط التحميل
        function updateProgressBar(info) {
            const percent = Math.round((info.loaded / info.total) * 100);
            const progressBar = document.getElementById('progress-bar');
            const percentText = document.getElementById('upload-percent');
            const uploadedSize = document.getElementById('uploaded-size');
            
            if (progressBar) progressBar.style.width = percent + '%';
            if (percentText) percentText.textContent = percent + '%';
            if (uploadedSize) uploadedSize.textContent = formatBytes(info.loaded);
            
            document.getElementById('upload-status').innerHTML = '<i class="fas fa-upload mr-2"></i>UPLOADING';
            
            // حساب الوقت المتبقي
            if (uploadStartTime && percent > 0) {
                const elapsed = (Date.now() - uploadStartTime) / 1000;
                const speed = info.loaded / elapsed;
                const remaining = (info.total - info.loaded) / speed;
                document.getElementById('time-remaining').textContent = `ESTIMATED: ${formatTime(remaining)}`;
            }
        }

        // وظائف مساعدة
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatTime(seconds) {
            if (seconds < 60) return Math.round(seconds) + 's';
            const minutes = Math.floor(seconds / 60);
            const secs = Math.round(seconds % 60);
            return minutes + 'm ' + secs + 's';
        }

        function setUploadType(type) {
            currentUploadType = type;
            
            // تحديث الأزرار
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.type-btn').classList.add('active');
            
            // تحديث النص والتنسيقات
            const hint = document.getElementById('file-type-hint');
            const input = document.getElementById('file-input');
            
            if (type === 'video') {
                hint.textContent = 'VIDEO FILES ONLY (MP4, MOV, AVI)';
                input.accept = 'video/*';
            } else {
                hint.textContent = 'IMAGE FILES ONLY (JPG, PNG, GIF)';
                input.accept = 'image/*';
            }
            
            // إعادة تهيئة الـ Widget
            initCloudinaryWidget();
            updateLog("UPLOAD_TYPE_SET :: " + type.toUpperCase());
        }

        // معالجة الملفات
        function handleFileSelect(file) {
            if (!file) return;
            
            selectedFile = file;
            
            // التحقق من نوع الملف
            const isValid = currentUploadType === 'video' ? 
                file.type.startsWith('video/') : 
                file.type.startsWith('image/');
            
            if (!isValid) {
                alert(`Please select a valid ${currentUploadType} file!`);
                return;
            }
            
            // عرض معاينة الملف
            showFilePreview(file);
            
            // تحديث واجهة المستخدم
            document.getElementById('progress-section').style.display = 'block';
            document.getElementById('file-size').textContent = formatBytes(file.size);
            document.getElementById('uploaded-size').textContent = '0 Bytes';
            document.getElementById('upload-status').innerHTML = '<i class="fas fa-check mr-2"></i>FILE READY';
            document.getElementById('upload-btn').disabled = false;
            
            updateLog("FILE_SELECTED :: " + file.name);
        }

        function showFilePreview(file) {
            const container = document.getElementById('file-preview-container');
            const reader = new FileReader();
            
            reader.onload = (e) => {
                if (file.type.startsWith('video')) {
                    container.innerHTML = `
                        <video src="${e.target.result}" controls class="file-preview"></video>
                        <p class="text-xs text-cyan-400 mt-2 font-[Orbitron]">${file.name}</p>
                    `;
                } else if (file.type.startsWith('image')) {
                    container.innerHTML = `
                        <img src="${e.target.result}" class="file-preview">
                        <p class="text-xs text-cyan-400 mt-2 font-[Orbitron]">${file.name}</p>
                    `;
                }
            };
            
            reader.readAsDataURL(file);
        }

        // وظائف الرفع
        function startUpload() {
            if (!selectedFile) {
                alert('Please select a file first!');
                return;
            }
            
            uploadStartTime = Date.now();
            updateLog("INITIATING_UPLOAD_SEQUENCE");
            document.getElementById('upload-btn').disabled = true;
            
            // استخدام Cloudinary Widget
            if (cloudinaryWidget) {
                cloudinaryWidget.open();
            } else {
                // Fallback للمحاكاة
                simulateUpload();
            }
        }

        function simulateUpload() {
            let progress = 0;
            const totalSize = selectedFile.size;
            
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) progress = 100;
                
                const progressBar = document.getElementById('progress-bar');
                const percentText = document.getElementById('upload-percent');
                const uploadedSize = document.getElementById('uploaded-size');
                
                if (progressBar) progressBar.style.width = progress + '%';
                if (percentText) percentText.textContent = Math.round(progress) + '%';
                if (uploadedSize) uploadedSize.textContent = formatBytes(totalSize * progress / 100);
                
                if (progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('upload-status').innerHTML = '<i class="fas fa-check-circle mr-2"></i>UPLOAD COMPLETE';
                    
                    // حفظ في قاعدة البيانات
                    const mockUrl = URL.createObjectURL(selectedFile);
                    db.ref('videos/').push({
                        url: mockUrl,
                        type: currentUploadType,
                        likes: 0,
                        timestamp: Date.now()
                    });
                    
                    setTimeout(() => {
                        closeUploadPanel();
                        resetUploadInterface();
                    }, 1500);
                }
            }, 200);
        }

        function resetUploadInterface() {
            selectedFile = null;
            document.getElementById('progress-section').style.display = 'none';
            document.getElementById('file-preview-container').innerHTML = '';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('upload-btn').disabled = false;
            document.getElementById('file-input').value = '';
        }

        // فتح وإغلاق اللوحات
        function openUploadPanel() {
            document.getElementById('upload-panel').style.display = 'flex';
            initCloudinaryWidget();
            updateLog("UPLOAD_INTERFACE_ACTIVE");
            
            // إعداد مستمع الملفات
            const fileInput = document.getElementById('file-input');
            fileInput.onchange = (e) => handleFileSelect(e.target.files[0]);
            
            // إعداد السحب والإفلات
            const dropZone = document.getElementById('drop-zone');
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
            
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });
            
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                }
            });
        }

        function closeUploadPanel() {
            document.getElementById('upload-panel').style.display = 'none';
            resetUploadInterface();
            updateLog("UPLOAD_INTERFACE_CLOSED");
        }

        function toggleComments() {
            const overlay = document.getElementById('comment-overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        function checkAdmin() {
            const password = prompt("ENTER ACCESS CODE:");
            if (password === "1234") {
                document.getElementById('admin-panel').style.display = 'flex';
                updateLog("ADMIN_ACCESS_GRANTED");
            } else if (password) {
                updateLog("ACCESS_DENIED");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }

        // تهيئة المراقب والألوان
        const ionicColors = ['#00f2ff', '#ff007f', '#00ff88', '#ffcc00', '#9d00ff'];

        // مراقبة قاعدة البيانات
        db.ref('videos').on('value', snap => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-master-list');
            
            if (!container) return;
            
            container.innerHTML = ''; 
            if(adminList) adminList.innerHTML = '';
            
            const data = snap.val(); 
            if(!data) {
                container.innerHTML = '<div class="flex items-center justify-center h-full text-cyan-400 font-[Orbitron]">NO_CONTENT_AVAILABLE</div>';
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                
                if (vid.type === 'image') {
                    section.innerHTML = `
                        <div class="watermark">VOID_LION_PRO</div>
                        <img src="${vid.url}" class="media-content" onclick="this.requestFullscreen?.()">
                        <div class="sidebar-ops">
                            <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-bolt"></i><span>${vid.likes || 0}</span></div>
                            <div class="op-btn" onclick="toggleComments()"><i class="fas fa-comment"></i><span>COMMS</span></div>
                            <div class="op-btn" onclick="shareNode('${vid.url}')"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                        </div>`;
                } else {
                    section.innerHTML = `
                        <div class="watermark">VOID_LION_PRO</div>
                        <video id="vid-${id}" loop playsinline muted data-src="${vid.url}" class="media-content" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="sidebar-ops">
                            <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-bolt"></i><span>${vid.likes || 0}</span></div>
                            <div class="op-btn" onclick="toggleMute('${id}')" id="mute-btn-${id}"><i class="fas fa-volume-off"></i><span>AUDIO</span></div>
                            <div class="op-btn" onclick="toggleComments()"><i class="fas fa-comment"></i><span>COMMS</span></div>
                            <div class="op-btn" onclick="shareNode('${vid.url}')"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                        </div>`;
                }
                
                container.appendChild(section);
                
                if(adminList) {
                    adminList.innerHTML += `
                        <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center border border-white/10">
                            <div>
                                <span class="text-cyan-400">NODE_${id.substring(0,8)}</span>
                                <span class="text-xs text-white/50 ml-2">${vid.type || 'video'}</span>
                            </div>
                            <button onclick="deleteVid('${id}')" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/30 transition-all">
                                <i class="fas fa-trash mr-2"></i>PURGE
                            </button>
                        </div>`;
                }
            });
            
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (v && e.isIntersecting) { 
                        if(!v.src) v.src = v.dataset.src;
                        v.play().catch(()=>{}); 
                        document.documentElement.style.setProperty('--v-color', ionicColors[Math.floor(Math.random() * ionicColors.length)]);
                        updateLog("SCANNING_NODE_" + (v.id ? v.id.substring(4,10) : 'IMAGE'));
                    } else if (v) { 
                        v.pause(); 
                    }
                });
            }, { threshold: 0.7 });
            
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        // وظائف التفاعل
        function triggerLike(id) { 
            db.ref('videos/' + id + '/likes').transaction(l => (l || 0) + 1); 
            updateLog("NODE_UPVOTED");
        }

        function toggleMute(id) { 
            const v = document.getElementById('vid-'+id); 
            const btn = document.getElementById('mute-btn-'+id);
            if(v && btn) {
                v.muted = !v.muted; 
                btn.innerHTML = v.muted ? 
                    '<i class="fas fa-volume-off"></i><span>AUDIO</span>' : 
                    '<i class="fas fa-volume-up"></i><span>LIVE</span>'; 
            }
        }

        function shareNode(url) { 
            if(navigator.share) { 
                navigator.share({title: 'VOID_LION', url: url}); 
            } else {
                navigator.clipboard?.writeText(url).then(() => {
                    updateLog("LINK_COPIED_TO_CLIPBOARD");
                });
            } 
        }

        function deleteVid(id) { 
            if(confirm("CONFIRM NODE PURGE?")) {
                db.ref('videos/' + id).remove()
                    .then(() => updateLog("NODE_PURGED_SUCCESSFULLY"))
                    .catch(err => updateLog("PURGE_ERROR :: " + err));
            }
        }

        function sendSignal() {
            const inp = document.getElementById('msg-input');
            if(inp && inp.value.trim()) { 
                db.ref('vox_chat').push({ 
                    text: inp.value,
                    timestamp: Date.now()
                }).then(() => {
                    inp.value = ''; 
                    updateLog("SIGNAL_BROADCASTED");
                });
            }
        }

        // مراقبة المحادثة
        db.ref('vox_chat').limitToLast(50).on('value', s => {
            const box = document.getElementById('chat-box'); 
            if(box) {
                box.innerHTML = '';
                s.forEach(m => {
                    const msg = m.val();
                    box.innerHTML += `
                        <div class="bg-white/5 p-3 rounded-lg border-r-2 border-[var(--v-color)] font-mono text-[11px] text-white/80">
                            <span class="text-cyan-400 text-[9px]">SIGNAL_IN::</span> ${msg.text}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            }
        });

        // الساعة
        setInterval(() => {
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // ربط الأحداث
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById("upload-trigger").onclick = openUploadPanel;
        });
    </script>
</body>
</html>
