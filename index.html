<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_LION_V27 | ELITE EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --v-color: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }

        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5;
            -webkit-mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
            mask-image: radial-gradient(circle at center, black 35%, rgba(0,0,0,0.4) 65%, transparent 95%);
        }

        .digital-clock { position: fixed; top: 35px; left: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--v-color); font-family: 'Orbitron'; font-size: 14px; color: var(--v-color); z-index: 1000; }
        .system-log { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); width: 85%; text-align: center; font-family: 'Orbitron'; font-size: 8px; color: var(--v-color); opacity: 0.7; z-index: 400; }

        header { position: fixed; top: 30px; right: 25px; z-index: 500; }
        .brand-box { background: rgba(0,0,0,0.4); padding: 10px 20px; border-right: 4px solid var(--v-color); backdrop-filter: blur(15px); border-radius: 8px; display: flex; align-items: center; gap: 12px; }
        
        nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 75px; background: rgba(0,5,10,0.8); backdrop-filter: blur(25px); border: 1px solid var(--v-color); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        
        #upload-trigger-btn { width: 75px; height: 75px; background: linear-gradient(135deg, var(--v-color), #0044ff); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; border: 5px solid #000; box-shadow: 0 0 25px var(--v-color); cursor: pointer; position: relative; }

        /* شريط التحميل الدائري حول الزر */
        .progress-ring { position: absolute; top: -5px; left: -5px; width: 85px; height: 85px; pointer-events: none; transform: rotate(-90deg); display: none; }
        .progress-ring circle { stroke: var(--v-color); stroke-width: 4; fill: transparent; stroke-dasharray: 251; stroke-dashoffset: 251; transition: 0.2s; }

        #upload-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.95); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(25px); }
        .upload-card { border: 2px dashed var(--v-color); border-radius: 30px; padding: 40px 20px; text-align: center; background: rgba(255,255,255,0.03); cursor: pointer; }
        
        .sidebar-ops { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .op-btn { width: 58px; height: 58px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1.5px solid var(--v-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .op-btn i { font-size: 20px; color: var(--v-color); }
        .op-btn span { font-size: 8px; font-family: 'Orbitron'; color: #fff; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="digital-clock" id="clock">00:00:00</div>
    <div class="system-log" id="log-text">SYSTEM_READY</div>
    
    <header><div class="brand-box"><i class="fas fa-lion text-2xl" style="color: var(--v-color);"></i><span class="font-[Orbitron] text-white">VOID_LION_V27</span></div></header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div onclick="checkAdmin()"><i class="fas fa-fingerprint text-3xl text-white/30"></i></div>
        <div id="upload-trigger-btn" onclick="toggleUpload()">
            <svg class="progress-ring" id="p-ring"><circle cx="42.5" cy="42.5" r="40"></circle></svg>
            <i class="fas fa-plus text-2xl text-white" id="upload-icon"></i>
        </div>
        <div onclick="toggleComments()"><i class="fas fa-tower-broadcast text-3xl text-white/30"></i></div>
    </nav>

    <div id="upload-overlay">
        <div class="flex justify-between items-center mb-12 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400">DIRECT_UPLOAD</h2>
            <i class="fas fa-xmark text-3xl text-white cursor-pointer" onclick="toggleUpload()"></i>
        </div>
        <input type="file" id="file-input" hidden accept="video/*" onchange="handleUpload(this.files[0])">
        <div class="upload-card" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-cloud-arrow-up text-4xl text-cyan-400 mb-4"></i>
            <h3 class="text-white font-bold">اختار الفيديو</h3>
            <p id="upload-status" class="text-white/40 text-xs mt-2">WAITING_FOR_INPUT</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // إعدادات Cloudinary
        const CLOUD_NAME = "duzoqh3jp";
        const UPLOAD_PRESET = "so_34k";

        function toggleUpload() {
            const up = document.getElementById('upload-overlay');
            up.style.display = (up.style.display==='flex')?'none':'flex';
        }

        async function handleUpload(file) {
            if (!file) return;
            
            toggleUpload(); // إغلاق النافذة فوراً
            updateLog("UPLOADING_NODE...");
            
            const ring = document.getElementById('p-ring');
            const circle = ring.querySelector('circle');
            const icon = document.getElementById('upload-icon');
            
            ring.style.display = 'block';
            icon.className = "fas fa-spinner fa-spin text-2xl text-white";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);

            xhr.upload.onprogress = (e) => {
                const percent = Math.round((e.loaded / e.total) * 100);
                const offset = 251 - (251 * percent / 100);
                circle.style.strokeDashoffset = offset;
                updateLog(`SYNCING: ${percent}%`);
            };

            xhr.onload = () => {
                const res = JSON.parse(xhr.responseText);
                db.ref('videos/').push({ url: res.secure_url, likes: 0, timestamp: Date.now() });
                resetUploadUI("SUCCESS");
            };

            xhr.onerror = () => resetUploadUI("ERROR");
            xhr.send(formData);
        }

        function resetUploadUI(status) {
            updateLog(status);
            document.getElementById('p-ring').style.display = 'none';
            document.getElementById('upload-icon').className = "fas fa-plus text-2xl text-white";
        }

        // --- بقية الكود الأساسي (Firebase & UI) ---
        db.ref('videos').on('value', snap => {
            const container = document.getElementById('video-stack');
            container.innerHTML = '';
            const data = snap.val(); if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <video id="vid-${id}" loop playsinline muted data-src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="sidebar-ops">
                        <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-bolt"></i><span>${vid.likes || 0}</span></div>
                    </div>`;
                container.appendChild(section);
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { v.src = v.dataset.src; v.play(); } else { v.pause(); }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function updateLog(msg) { document.getElementById('log-text').innerText = msg; }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'), 1000);
    </script>
</body>
</html>
